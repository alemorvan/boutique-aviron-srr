# ============================================================
# Build & push de l'image Docker sur création d'un tag vX.Y.Z
# - Déclencheur : push d'un tag correspondant au pattern "v*"
# - Destination : GitHub Container Registry (ghcr.io)
# - Auth        : GITHUB_TOKEN automatique, pas de secret à créer
# ============================================================
name: Release Docker image

on:
  push:
    tags:
      - 'v*'

# Autorise le workflow à publier sur GHCR en tant que ce repo
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère automatiquement plusieurs tags pour l'image :
      #   ghcr.io/<owner>/<repo>:<tag-git>        ex: v1.2.3
      #   ghcr.io/<owner>/<repo>:<X.Y>            ex: 1.2
      #   ghcr.io/<owner>/<repo>:<X>              ex: 1
      #   ghcr.io/<owner>/<repo>:latest           (uniquement sur tag non-prerelease)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=Boutique Aviron SRR
            org.opencontainers.image.description=Catalogue vestimentaire en ligne - Société des Régates Rennaises
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
