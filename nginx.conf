# ============================================================
# Configuration nginx - Catalogue Vestimentaire SRR
# ============================================================

# Déclaration des types MIME spécifiques (YAML notamment)
types {
    text/yaml                 yaml yml;
    text/plain                txt;
    text/html                 html htm;
    text/css                  css;
    application/javascript    js;
    application/json          json;
    image/svg+xml             svg;
    image/png                 png;
    image/jpeg                jpg jpeg;
    image/webp                webp;
    image/gif                 gif;
    image/x-icon              ico;
    font/woff                 woff;
    font/woff2                woff2;
}

server {
    # L'image nginx-unprivileged écoute sur 8080 (non privilégié)
    listen 8080;
    listen [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip pour réduire la taille du transfert
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/yaml
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # En-têtes de sécurité
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ========= Routage =========

    # Le fichier YAML : pas de cache (pour permettre
    # la modification à chaud du catalogue) + charset UTF-8
    location = /config/products.yaml {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        charset utf-8;
        default_type text/yaml;
    }

    # CSS / JS : cache court (1h) — permet d'itérer sans trop attendre
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Images : cache long (7 jours)
    location ~* \.(png|jpg|jpeg|webp|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # HTML : pas de cache navigateur (l'app est légère)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Route par défaut : renvoie l'index si le fichier existe,
    # sinon 404. (Pas de SPA fallback ici — page unique.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Petite page de santé pour les orchestrateurs (K8s, Docker healthcheck…)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Bloquer l'accès aux fichiers cachés (.git, .env…)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Pages d'erreur
    error_page 404 /index.html;
}
