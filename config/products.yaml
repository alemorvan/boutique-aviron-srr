# ============================================================================
# CATALOGUE VESTIMENTAIRE - Société des régates Rennaises
# Saison 2025-2026
# ----------------------------------------------------------------------------
# Ce fichier est utilisé UNIQUEMENT pour la GÉNÉRATION STATIQUE du site
# (via build/build.py). Il n'est PAS servi au public et n'est PAS inclus
# dans l'image Docker finale.
#
# Pour modifier le catalogue :
#   1. Éditez ce fichier
#   2. Rebuildez :                 docker compose build
#   3. Relancez :                  docker compose up -d
#
# ----------------------------------------------------------------------------
# Structure d'un article :
#
#   nom        : Nom affiché à l'utilisateur
#   categorie  : ID d'une catégorie (tee_technique, veste, ...)
#   marque     : Marque du fournisseur
#   collection : Nom/année de la collection fournisseur (facultatif)
#   modele     : Modèle fournisseur (facultatif)
#   images     : Liste de noms de fichiers (dossier images/produits/)
#   couleurs   : Liste des couleurs disponibles pour ce modèle
#                (les couleurs sont identiques pour tous les genres d'un modèle)
#   description: Description détaillée (facultative)
#
#   genres     : Dictionnaire des variantes de genre. Chaque clé est l'un de
#                [hommes, femmes, mixtes, enfants] et contient :
#                  prix       : Prix en € pour cette variante
#                  tailles    : Liste des tailles spécifiques à ce genre
#                  sku        : Dictionnaire {couleur: référence fournisseur}
#                               Une référence fournisseur par
#                               couple (modèle, genre, couleur).
#
# GOOGLE_SCRIPT_URL (enregistrement automatique dans Google Sheets) est
# fourni au runtime par variable d'environnement Docker, pas dans ce YAML.
#
# NOTE : les références SKU sont actuellement des placeholders cohérents.
#        À remplacer par les vraies références fournisseur quand elles sont
#        disponibles. build.py vérifie l'unicité des SKU au sein de deux
#        buckets distincts :
#          - "adultes" : genres hommes / femmes / mixtes
#          - "enfants" : genre enfants
#        Conséquence : un article adulte et un article enfant peuvent
#        réutiliser la même référence fournisseur (fréquent chez Erima,
#        Kappa…) sans erreur — ils resteront gérés comme deux lignes
#        distinctes dans le panier et sur le bon de commande.
# ============================================================================

# ------------------------------------------------------------
# Informations générales de la boutique
# ------------------------------------------------------------
boutique:
  nom_club: "Société des Régates Rennaises"
  nom_boutique: "Catalogue Vestimentaire"
  email_contact: "contact@regatesrennaises.org"
  devise: "€"
  # Coordonnées de paiement — l'IBAN peut être surchargé au runtime via CLUB_IBAN
  iban: "FRXX XXXX XXXX XXXX XXXX XXXX XXX"
  ordre_cheque: "Société des Régates Rennaises"
  # Logos (chemins relatifs au dossier assets/)
  logo_simple: "logo_simple.png"        # en-tête du site
  logo_detaille: "logo_detailles.jpg"   # en-tête des PDF

# ------------------------------------------------------------
# Catégories de vêtements (ordre d'affichage)
# ------------------------------------------------------------
categories:
  - id: tee_technique
    nom: "Tee-shirts techniques"
    icone: "🏃"
  - id: tee_coton
    nom: "Tee-shirts coton"
    icone: "👕"
  - id: tee_polyester
    nom: "Tee-shirts polyester"
    icone: "🎽"
  - id: veste
    nom: "Vestes et sweats"
    icone: "🧥"
  - id: pantalon
    nom: "Pantalons"
    icone: "👖"
  - id: polo
    nom: "Polos"
    icone: "👔"

